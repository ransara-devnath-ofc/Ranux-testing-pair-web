<!-- --- START OF FILE pair.html --- -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KING RANUX PRO | ULTIMATE LINK</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #6366f1;
            --accent: #d946ef;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --bg: #030014;
            --glass: rgba(15, 15, 25, 0.75);
            --border: rgba(255, 255, 255, 0.08);
            --smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            position: relative;
        }

        /* --- 1. BOOT SCREEN (Splash) --- */
        #bootScreen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #050510;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: 'JetBrains Mono', monospace;
            transition: opacity 0.8s var(--smooth);
        }

        .boot-loader {
            width: 55px; height: 55px;
            border: 3px solid rgba(255,255,255,0.05);
            border-top-color: var(--primary);
            border-right-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s var(--smooth) infinite;
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.2);
        }

        .log-container {
            width: 90%; max-width: 400px;
            text-align: left;
            height: 150px;
            overflow: hidden;
        }

        .log-line {
            color: var(--success);
            font-size: 11px;
            margin: 5px 0;
            opacity: 0;
            transform: translateY(15px);
            animation: fadeInUp 0.4s var(--smooth) forwards;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }

        /* --- 2. AMBIENT BACKGROUND --- */
        .ambient-bg {
            position: absolute;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15), transparent 40%),
                        radial-gradient(circle at 90% 80%, rgba(217, 70, 239, 0.15), transparent 40%);
            animation: pulseBg 12s infinite alternate ease-in-out;
        }
        @keyframes pulseBg { 0% { opacity: 0.4; transform: scale(1); } 100% { opacity: 1; transform: scale(1.05); } }

        /* --- 3. MAIN GLASS CARD --- */
        .glass-card {
            width: 90%; max-width: 440px;
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border);
            border-top: 1px solid rgba(255,255,255,0.15);
            border-radius: 28px;
            padding: 35px 30px;
            opacity: 0;
            transform: scale(0.92) translateY(20px);
            transition: all 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            max-height: 90vh;
            overflow-y: auto;
        }

        .glass-card.visible { opacity: 1; transform: scale(1) translateY(0); }

        /* Header */
        .header { text-align: center; margin-bottom: 25px; }
        .logo-glow {
            font-size: 46px;
            background: linear-gradient(135deg, #fff, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 25px rgba(99, 102, 241, 0.5));
            display: inline-block;
            animation: float 4s ease-in-out infinite;
        }
        
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

        h1 { font-size: 28px; font-weight: 700; letter-spacing: 1.5px; color: white; margin-bottom: 2px; }
        .subtitle { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 0.8px; text-transform: uppercase; font-weight: 500; }

        /* Tabs */
        .tab-wrapper {
            background: rgba(0,0,0,0.4);
            border-radius: 16px;
            padding: 6px;
            display: flex;
            position: relative;
            margin-bottom: 25px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
        }

        .tab-item {
            flex: 1;
            text-align: center;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            cursor: pointer;
            z-index: 2;
            transition: all 0.4s var(--smooth);
            border-radius: 12px;
        }

        .tab-item:hover { color: rgba(255,255,255,0.8); }
        .tab-item.active { color: white; background: rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        /* Sections */
        .section { display: none; opacity: 0; transform: translateY(10px); transition: all 0.4s var(--smooth); }
        .section.active { display: block; opacity: 1; transform: translateY(0); animation: slideUpFade 0.5s var(--smooth); }
        
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Inputs */
        .input-box { position: relative; margin-bottom: 18px; }
        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 18px 20px 18px 55px;
            border-radius: 18px;
            color: white;
            font-size: 16px;
            font-family: 'JetBrains Mono', monospace;
            outline: none;
            transition: all 0.3s var(--smooth);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.2);
        }
        input:focus { 
            border-color: var(--primary); 
            background: rgba(0,0,0,0.5); 
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15), inset 0 2px 5px rgba(0,0,0,0.2); 
        }
        .icon { position: absolute; left: 22px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.4); font-size: 18px; transition: color 0.3s; }
        input:focus + .icon { color: var(--primary); }

        /* --- 4. PROCESSING BAR BUTTON --- */
        .btn-container { position: relative; height: 58px; overflow: hidden; border-radius: 18px; margin-top: 15px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }

        .btn-main {
            width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            color: white;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1.2px;
            cursor: pointer;
            position: absolute;
            top: 0; left: 0;
            transition: all 0.4s var(--smooth);
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(99, 102, 241, 0.4); filter: brightness(1.1); }
        .btn-main:active { transform: translateY(1px); }

        .progress-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a14;
            z-index: 1;
            display: flex;
            align-items: center;
            padding: 0 6px;
        }

        .progress-bar {
            height: 6px;
            width: 0%;
            background: linear-gradient(90deg, var(--success), #34d399);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--success);
            transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            position: relative;
        }

        .status-txt {
            position: absolute; width: 100%; text-align: center;
            font-size: 13px; font-weight: 600; font-family: 'JetBrains Mono'; color: white;
            top: 50%; transform: translateY(-50%); z-index: 3; display: none;
            letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        /* Result Boxes */
        .result-hud {
            margin-top: 25px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 25px 20px;
            text-align: center;
            display: none;
            animation: slideInSoft 0.6s var(--smooth);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        @keyframes slideInSoft { from { opacity: 0; transform: translateY(20px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .code-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 32px;
            color: var(--success);
            font-weight: 700;
            letter-spacing: 3px;
            text-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
            margin: 15px 0;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.3s;
            padding: 10px;
            background: rgba(16, 185, 129, 0.05);
            border-radius: 12px;
            border: 1px dashed rgba(16, 185, 129, 0.2);
        }
        .code-display:hover { transform: scale(1.02); background: rgba(16, 185, 129, 0.1); }

        .qr-frame {
            background: white; padding: 12px; border-radius: 18px;
            display: inline-block; margin-bottom: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            transition: transform 0.4s var(--smooth);
        }
        .qr-frame:hover { transform: scale(1.05) rotate(1deg); }
        .qr-frame img { width: 210px; display: block; border-radius: 8px; }

        .timer-badge {
            display: inline-block; background: rgba(239, 68, 68, 0.15);
            color: #fca5a5; padding: 6px 14px; border-radius: 20px;
            font-size: 12px; font-weight: 600; margin-top: 5px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* Footer */
        .footer { margin-top: 35px; text-align: center; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .signature {
            font-family: 'Great Vibes', cursive;
            font-size: 28px;
            background: linear-gradient(to right, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none; transition: opacity 0.3s;
        }
        .signature:hover { opacity: 0.8; }

        /* Toast */
        .toast {
            position: fixed; top: 40px; left: 50%; transform: translateX(-50%) translateY(-120px);
            background: rgba(255,255,255,0.95); color: #000;
            padding: 12px 28px; border-radius: 50px; font-weight: 600; font-size: 14px;
            z-index: 10000; transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            display: flex; align-items: center; gap: 8px;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast i { font-size: 16px; }
        .toast.error { background: var(--error); color: white; }
        .toast.warning { background: var(--warning); color: white; }
    </style>
</head>
<body>

    <!-- BOOT SCREEN -->
    <div id="bootScreen">
        <div class="boot-loader"></div>
        <div class="log-container" id="logContainer"></div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast"><i class="fas fa-info-circle"></i> <span>Notification</span></div>

    <div class="ambient-bg"></div>
    
    <div class="glass-card" id="mainCard">
        
        <div class="header">
            <i class="fas fa-crown logo-glow"></i>
            <h1>KING RANUX PRO</h1>
            <p class="subtitle">PREMIUM DEVICE LINKING SUITE</p>
        </div>

        <div class="tab-wrapper">
            <div class="tab-item active" onclick="switchTab('pair')">Phone Number</div>
            <div class="tab-item" onclick="switchTab('qr')">QR Scan</div>
        </div>

        <!-- PAIR SECTION -->
        <div id="pairSection" class="section active">
            <div class="input-box">
                <input type="tel" id="phoneNumber" placeholder="94726880784" autocomplete="off">
                <i class="fas fa-phone-alt icon"></i>
            </div>
            <p style="font-size: 11px; color: rgba(255,255,255,0.4); margin: -10px 0 22px 12px; font-weight: 300;">
                *Enter number with country code (no + sign)
            </p>

            <div class="btn-container">
                <div class="status-txt" id="pairStatus">CONNECTING...</div>
                <div class="progress-area"><div class="progress-bar" id="pairBar"></div></div>
                <button class="btn-main" id="pairBtn" onclick="generatePair()">
                    GET PAIRING CODE
                </button>
            </div>

            <div class="result-hud" id="pairResult">
                <p style="font-size:11px; font-weight:600; color:rgba(255,255,255,0.5); letter-spacing:2px; text-transform:uppercase;">Session ID Generated</p>
                <div class="code-display" id="codeText" onclick="copyToClipboard('codeText')" title="Click to copy">--- ---</div>
                <p style="font-size:11px; color:rgba(255,255,255,0.4);"><i class="far fa-copy"></i> Tap code to copy</p>
                <div class="timer-badge" id="pairTimer"><i class="far fa-clock"></i> Expires in 60s</div>
            </div>
        </div>

        <!-- QR SECTION -->
        <div id="qrSection" class="section">
            <div class="btn-container">
                <div class="status-txt" id="qrStatus">FETCHING QR...</div>
                <div class="progress-area"><div class="progress-bar" id="qrBar"></div></div>
                <button class="btn-main" id="qrBtn" onclick="generateQR()">
                    GENERATE QR CODE
                </button>
            </div>

            <div class="result-hud" id="qrResult">
                <div class="qr-frame">
                    <img id="qrImage" src="" alt="QR">
                </div>
                <p style="font-size:13px; font-weight:500; color:rgba(255,255,255,0.7); margin-top:12px;">
                    WhatsApp > Linked Devices > Link a Device
                </p>
            </div>
        </div>

        <div class="footer">
            <a href="https://wa.me/94726880784" target="_blank" style="text-decoration:none;">
                <span style="font-size:10px; font-weight:600; color:rgba(255,255,255,0.4); display:block; margin-bottom:2px; letter-spacing: 1px;">DEVELOPED BY</span>
                <span class="signature">MR Ransara Devnath</span>
            </a>
        </div>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"></script>
    <script>
        /* --- BOOT SEQUENCE --- */
        const logs =[
            "Initialize King Ranux Pro...",
            "Loading V7 Protocol Engine...",
            "Connect to Render Servers...",
            "Fetch In Project Components...",
            "Connect to King RANUX PRO Servers...",
            "Start Service and Boot Successful..."
        ];

        window.onload = async () => {
            const container = document.getElementById('logContainer');
            for(let i=0; i<logs.length; i++){
                await new Promise(r => setTimeout(r, 350));
                const div = document.createElement('div');
                div.className = 'log-line';
                div.innerText = `> ${logs[i]}`;
                container.appendChild(div);
                container.scrollTop = container.scrollHeight;
            }
            setTimeout(() => {
                document.getElementById('bootScreen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('bootScreen').style.display = 'none';
                    document.getElementById('mainCard').classList.add('visible');
                }, 800);
            }, 800);
        };

        /* --- UI LOGIC --- */
        function switchTab(mode) {
            const tabs = document.querySelectorAll('.tab-item');
            const pSec = document.getElementById('pairSection');
            const qSec = document.getElementById('qrSection');
            
            // Smoothly hide results when switching
            document.querySelectorAll('.result-hud').forEach(el => {
                el.style.opacity = '0';
                setTimeout(() => el.style.display = 'none', 300);
            });

            if(mode === 'pair') {
                tabs[0].classList.add('active'); tabs[1].classList.remove('active');
                pSec.classList.add('active'); qSec.classList.remove('active');
            } else {
                tabs[0].classList.remove('active'); tabs[1].classList.add('active');
                pSec.classList.remove('active'); qSec.classList.add('active');
            }
        }

        // Input Filter
        document.getElementById('phoneNumber').addEventListener('input', function(e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });

        /* --- API LOGIC FOR PAIRING --- */
        async function generatePair() {
            const num = document.getElementById('phoneNumber').value;
            if(num.length < 10) {
                showToast("Please enter a valid phone number!", "error");
                return;
            }

            const btn = document.getElementById('pairBtn');
            const bar = document.getElementById('pairBar');
            const status = document.getElementById('pairStatus');
            const resBox = document.getElementById('pairResult');

            // UI Reset
            resBox.style.display = 'none';
            resBox.style.opacity = '1';
            btn.style.opacity = '0'; btn.style.pointerEvents = 'none';
            status.style.display = 'block'; status.innerText = "CONNECTING..."; status.style.color = "white";
            bar.style.width = '0%'; bar.style.background = 'linear-gradient(90deg, var(--primary), var(--accent))';

            // Fake Progress Animation
            let width = 0;
            const interval = setInterval(() => {
                if(width < 85) { width += Math.random() * 6; bar.style.width = width + '%'; }
            }, 150);

            try {
                // Call Backend (pair.js logic)
                const { data } = await axios.get(`/pair?number=${num}`);
                
                clearInterval(interval);
                bar.style.background = 'linear-gradient(90deg, var(--success), #34d399)';
                bar.style.width = '100%';
                status.innerText = "SUCCESS!";
                status.style.color = "#10b981";

                setTimeout(() => {
                    if(data.code) {
                        document.getElementById('codeText').innerText = data.code;
                        resBox.style.display = 'block';
                        startTimer('pairTimer');
                        showToast("Pair Code Generated!", "success");
                    }
                    setTimeout(resetPairUI, 5000);
                }, 500);

            } catch (error) {
                clearInterval(interval);
                bar.style.background = 'linear-gradient(90deg, var(--error), #f87171)';
                bar.style.width = '100%';
                status.style.color = 'white';
                
                // Handle Server Busy or Rate Limits Gracefully
                const errorMsg = error.response?.data?.code || "Failed to connect. Try again.";
                
                if (error.response?.status === 503) {
                    status.innerText = "SERVER BUSY";
                    showToast(errorMsg, "warning");
                } else if (error.response?.status === 429 || errorMsg.includes("busy")) {
                    status.innerText = "RATE LIMITED";
                    showToast("WhatsApp is busy. Try again later.", "warning");
                } else {
                    status.innerText = "FAILED";
                    showToast(errorMsg, "error");
                }
                
                setTimeout(resetPairUI, 3000);
            }
        }

        function resetPairUI() {
            const btn = document.getElementById('pairBtn');
            const status = document.getElementById('pairStatus');
            const bar = document.getElementById('pairBar');
            
            btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
            status.style.display = 'none'; 
            bar.style.width = '0%';
        }

        /* --- API LOGIC FOR QR --- */
        async function generateQR() {
            const btn = document.getElementById('qrBtn');
            const bar = document.getElementById('qrBar');
            const status = document.getElementById('qrStatus');
            const resBox = document.getElementById('qrResult');

            resBox.style.display = 'none';
            resBox.style.opacity = '1';
            btn.style.opacity = '0'; btn.style.pointerEvents = 'none';
            status.style.display = 'block'; status.innerText = "FETCHING QR..."; status.style.color = "white";
            bar.style.width = '0%'; bar.style.background = 'linear-gradient(90deg, var(--primary), var(--accent))';

            let width = 0;
            const interval = setInterval(() => {
                if(width < 85) { width += Math.random() * 6; bar.style.width = width + '%'; }
            }, 150);

            try {
                // Call Backend (qr.js logic)
                const { data } = await axios.get(`/qr`);
                
                clearInterval(interval);
                bar.style.background = 'linear-gradient(90deg, var(--success), #34d399)';
                bar.style.width = '100%';
                status.innerText = "QR READY!";
                status.style.color = "#10b981";

                setTimeout(() => {
                    if(data.qr) {
                        document.getElementById('qrImage').src = data.qr;
                        resBox.style.display = 'block';
                        showToast("Scan QR Code Now", "success");
                    }
                    setTimeout(resetQrUI, 5000);
                }, 500);
            } catch (error) {
                clearInterval(interval);
                bar.style.background = 'linear-gradient(90deg, var(--error), #f87171)';
                bar.style.width = '100%';
                status.style.color = 'white';

                const errorMsg = error.response?.data?.code || "Failed to fetch QR.";
                if (error.response?.status === 503) {
                    status.innerText = "SERVER BUSY";
                    showToast(errorMsg, "warning");
                } else {
                    status.innerText = "ERROR";
                    showToast(errorMsg, "error");
                }
                
                setTimeout(resetQrUI, 3000);
            }
        }

        function resetQrUI() {
            const btn = document.getElementById('qrBtn');
            const status = document.getElementById('qrStatus');
            const bar = document.getElementById('qrBar');
            btn.style.opacity = '1'; btn.style.pointerEvents = 'auto';
            status.style.display = 'none'; bar.style.width = '0%';
        }

        /* --- UTILS --- */
        function copyToClipboard(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                showToast("Copied to Clipboard!", "success");
            }).catch(() => {
                showToast("Failed to copy!", "error");
            });
        }

        function startTimer(id) {
            let t = 60;
            const el = document.getElementById(id);
            const int = setInterval(() => {
                t--;
                el.innerHTML = `<i class="far fa-clock"></i> Expires in ${t}s`;
                if(t <= 0) { 
                    clearInterval(int); 
                    el.innerHTML = `<i class="fas fa-times-circle"></i> Expired`; 
                    el.style.color = "var(--error)";
                    el.style.background = "rgba(239, 68, 68, 0.2)";
                    el.style.border = "1px solid rgba(239, 68, 68, 0.5)";
                }
            }, 1000);
        }

        function showToast(msg, type = "normal") {
            const toast = document.getElementById('toast');
            const span = toast.querySelector('span');
            const icon = toast.querySelector('i');
            
            span.innerText = msg;
            toast.className = 'toast'; // reset classes
            
            if(type === 'error') {
                toast.classList.add('error');
                icon.className = 'fas fa-exclamation-circle';
            } else if(type === 'warning') {
                toast.classList.add('warning');
                icon.className = 'fas fa-exclamation-triangle';
            } else if(type === 'success') {
                icon.className = 'fas fa-check-circle';
                icon.style.color = 'var(--success)';
            } else {
                icon.className = 'fas fa-info-circle';
                icon.style.color = 'var(--primary)';
            }

            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3500);
        }
    </script>
